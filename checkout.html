<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - FashionHub</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="main-header">
        <nav class="navbar">
            <div class="nav-brand">
                <a href="index.html" class="logo">FashionHub</a>
            </div>
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" placeholder="Search for products, brands and more..." id="search-input">
                    <button class="search-btn" type="button" onclick="searchProducts()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M21 21L16.514 16.506M19 10.5C19 15.194 15.194 19 10.5 19S2 15.194 2 10.5 5.806 2 10.5 2 19 5.806 19 10.5Z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </button>
                </div>
            </div>
            <div class="nav-icons">
                <a href="index.html" class="offers-link">
                    <span class="offers-text">← Back to Store</span>
                </a>
                <div class="dropdown profile-dropdown">
                    <button class="dropdown-btn profile-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M20 21V19C20 17.9391 19.5786 16.9217 18.8284 16.1716C18.0783 15.4214 17.0609 15 16 15H8C6.93913 15 5.92172 15.4214 5.17157 16.1716C4.42143 16.9217 4 17.9391 4 19V21M16 7C16 9.20914 14.2091 11 12 11C9.79086 11 8 9.20914 8 7C8 4.79086 9.79086 3 12 3C14.2091 3 16 4.79086 16 7Z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                        <span>Profile</span>
                    </button>
                    <div class="dropdown-menu profile-menu">
                        <a href="profile.html#personal-info" class="dropdown-item">My Profile</a>
                        <a href="profile.html#orders" class="dropdown-item">My Orders</a>
                        <a href="profile.html#wishlist" class="dropdown-item">Wishlist</a>
                        <a href="profile.html#coupons" class="dropdown-item">Rewards</a>
                        <a href="profile.html#payments" class="dropdown-item">Wallet</a>
                        <a href="profile.html#address-book" class="dropdown-item">Addresses</a>
                        <a href="profile.html#notifications" class="dropdown-item">Notifications</a>
                        <a href="profile.html#help-support" class="dropdown-item">Help Center</a>
                        <hr class="dropdown-divider">
                        <a href="index.html" class="dropdown-item" onclick="handleLogout()">Logout</a>
                    </div>
                </div>
                <button class="icon-btn wishlist-btn" onclick="toggleWishlist()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M20.84 4.61C20.3292 4.099 19.7228 3.69364 19.0554 3.41708C18.3879 3.14052 17.6725 2.99817 16.95 2.99817C16.2275 2.99817 15.5121 3.14052 14.8446 3.41708C14.1772 3.69364 13.5708 4.099 13.06 4.61L12 5.67L10.94 4.61C9.9083 3.5783 8.50903 2.9987 7.05 2.9987C5.59096 2.9987 4.19169 3.5783 3.16 4.61C2.1283 5.6417 1.5487 7.04097 1.5487 8.5C1.5487 9.95903 2.1283 11.3583 3.16 12.39L12 21.23L20.84 12.39C21.351 11.8792 21.7563 11.2728 22.0329 10.6053C22.3095 9.93789 22.4518 9.22248 22.4518 8.5C22.4518 7.77752 22.3095 7.06211 22.0329 6.39467C21.7563 5.72723 21.351 5.1208 20.84 4.61V4.61Z" stroke="currentColor" stroke-width="2"/>
                    </svg>
                    <span class="wishlist-count" id="wishlist-count">0</span>
                </button>
                <button class="icon-btn cart-btn" onclick="toggleCart()">
                    <div class="cart-icon-wrapper">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                            <path d="M3 3H5L5.4 5M7 13H17L21 5H5.4M7 13L5.4 5M7 13L4.7 15.3C4.3 15.7 4.6 16.5 5.1 16.5H17M17 13V17C17 18.1 16.1 19 15 19H9C7.9 19 7 18.1 7 17V13M9 19C7.9 19 7 19.9 7 21S7.9 23 9 23 11 22.1 11 21 10.1 19 9 19ZM20 19C18.9 19 18 19.9 18 21S18.9 23 20 23 22 22.1 22 21 21.1 19 20 19Z" stroke="currentColor" stroke-width="2"/>
                        </svg>
                    </div>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
            </div>
        </nav>
    </header>
    
    <main>
        <div class="checkout-container">
        <h1>Checkout</h1>
        
        <div class="checkout-content">
            <div class="checkout-form">
                <h2>Shipping Information</h2>
                <form id="checkout-form">
                    <div class="form-group">
                        <input type="text" placeholder="Full Name" required>
                        <input type="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="tel" placeholder="Phone Number" required>
                        <input type="text" placeholder="Address" required>
                    </div>
                    <div class="form-group">
                        <input type="text" placeholder="City" required>
                        <input type="text" placeholder="Postal Code" required>
                    </div>
                    
                    <h2>Payment Method</h2>
                    <div class="payment-methods">
                        <label><input type="radio" name="payment" value="card" checked> Credit/Debit Card</label>
                        <label><input type="radio" name="payment" value="upi"> UPI</label>
                        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
                    </div>
                    
                    <div id="card-details" class="payment-details">
                        <input type="text" placeholder="Card Number" maxlength="19">
                        <div class="form-group">
                            <input type="text" placeholder="MM/YY" maxlength="5">
                            <input type="text" placeholder="CVV" maxlength="3">
                        </div>
                    </div>
                    
                    <button type="submit" class="place-order-btn">Place Order</button>
                </form>
            </div>
            
            <div class="order-summary">
                <h2>Order Summary</h2>
                <div id="checkout-items"></div>
                <div class="summary-totals">
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping:</span>
                        <span>₹99</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total:</span>
                        <span id="total">₹99</span>
                    </div>
                </div>
            </div>
        </div>
        </div>
    </main>
    
    <script src="js/checkout.js"></script>
</body>
</html>
